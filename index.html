<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добро пожаловать в ТехноМир</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            text-align: center;
        }
        .logo {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 1rem;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(0,170,255,0.7);
        }
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 3rem;
        }
        .enter-btn {
            padding: 15px 50px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            background: #00aaff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .enter-btn:hover {
            background: #0088cc;
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0,170,255,0.5);
        }
    </style>
</head>
<body>
    <div class="logo">🖥️ ТехноМир</div>
    <div class="subtitle">Мир компьютерной техники</div>
    <a href="site/main.html" class="enter-btn">Войти на сайт</a>
</body>
</html>
