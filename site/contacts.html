    <main>
        <h1>Свяжитесь с нами</h1>
        
        <div class="contact-info">
            <h2>Наш адрес</h2>
            <p>г. Москва, ул. Техническая, д. 15, офис 404</p>
            <p>📞 Телефон: <a href="tel:+74951234567">+7 (495) 123-45-67</a></p>
            <p>✉️ Email: <a href="mailto:info@technoworld.ru">info@technoworld.ru</a></p>
            <p>🕒 Время работы: Пн-Пт с 10:00 до 20:00, Сб-Вс с 11:00 до 18:00</p>
        </div>

        <div class="contact-form">
            <h2>Напишите нам</h2>
            <form action="#" method="post">
                <div class="form-group">
                    <label for="name">Ваше имя:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Сообщение:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Отправить</button>
            </form>
        </div>

        <div class="map">
            <h2>Мы на карте</h2>
            <!-- Встроенная карта Яндекс или Google (можно заменить на iframe) -->
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2245.458776123456!2d37.618423!3d55.756244!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x46b54a5a7b123456%3A0x1234567890abcdef!2z0JzQvtGB0LrQstCwLCDQo9C7LiDQotC10YXQvdC40YfQtdGB0LrQsNGPLCDQtC4gMTU!5e0!3m2!1sru!2sru!4v1699999999999" width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
